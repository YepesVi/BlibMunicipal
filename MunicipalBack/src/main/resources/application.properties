spring.application.name=MunicipalBack

# Configuración del puerto del servidor
server.port=8080    


# Configuración de la conexión a la base de datos postgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ⚙️ JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
security.jwt.secret=${JWT_SECRET_BASE64}
security.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}
# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER}

